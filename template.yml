experience:
  - company: BitBang
    url: https://www.bitbang.com
    location: Bologna
    period: 2021 - Ongoing
    roles:
      - title: AI Engineer
        period: 2024 - Ongoing
        summary: Development, design, and deployment of systems based on LLM and ML.
        highlights:
          - name: Enterprise LLM workflows
            description: >
              Technical lead in the development of RAG and agents serving
              multiple business units. Developed ingestion and retrieval pipelines
              with disambiguation flows and metadata-driven query resolution.
              Permission-aware retrieval to enforce access rules. Data anonymization through
              automatic entity extraction with lightweight local NLP models.
              Coordinated a cross-functional team to support the progressive evolution of the system into an
              enterprise AI platform. Stakeholder management across three different products.
          - name: Automation & classification
            description: >
              Responsible for the development of a purchase-request classification system.
              Delivered a hybrid model combining random forest with vector retrieval module
              over procurement guidelines.
              Mentoring and progressive delegation of activities to a junior colleague.
          - name: Cash flow forecast
            description: >
              Re-engineered a forecasting system that had grown into an unmaintainable
              collection of over 20 heterogeneous models spread across multiple data sources.
              The resulting system was more reproducible, maintainable and explainable.
              Outputs support weekly reporting to the finance department.
      - title: Data Scientist
        period: 2021 - 2024
        summary: Implementation of data-driven solutions based on statistical and ML models.
        highlights:
          - name: Customer analytics & demand forecasting
            description: >
              Contributed to the design of a forecasting model for raw material requirements
              based on historical sales and a multi-feature product matrix. Performed
              clustering analyses on e-commerce navigation data to identify traffic patterns
              across user segments, supporting marketing and personalization strategies.
          - name: Marketing performance measurement
            description: >
              Developed an internal Marketing Mix Modeling framework supporting
              what-if simulations and budget optimization.
              Results were served through an Azure web application backed by
              a deployed model on Azure ML. The tool became part of the company's offering.
          - name: NLP & Deep Learning
            description: >
              Developed a graph attention network for aspect-based opinion extraction in
              PyTorch Geometric, pre-trained on Wikipedia with a masked node prediction
              objective and fine-tuned on SemEval datasets, outperforming a rule-based
              dependency parsing baseline. Conducted topic modeling on
              survey data using sentence transformers.

